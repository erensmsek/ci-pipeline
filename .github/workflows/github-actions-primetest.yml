name: Build & Test
on: [push]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install JUnit 4
        run: |
          mkdir -p lib
          curl -L "https://search.maven.org/remotecontent?filepath=junit/junit/4.13.2/junit-4.13.2.jar" -o lib/junit.jar
          curl -L "https://search.maven.org/remotecontent?filepath=org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar" -o lib/hamcrest.jar
      - name: Compile
        run: javac -cp lib/junit.jar *.java
      - name: Run Tests
        run: java -cp .:lib/junit.jar:lib/hamcrest.jar org.junit.runner.JUnitCore PrimeCheckTest